<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>TubeDL</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <img src="icons/icon.png" alt="" />
        <div>
          <h1>TubeDL</h1>
          <p id="connection-status">Connexion à l’app...</p>
        </div>
      </header>

      <section class="panel">
        <p class="current-url" id="current-url">Chargement de l’onglet...</p>

        <div class="grid">
          <label>
            Format
            <select id="format">
              <option value="mp3">MP3</option>
              <option value="mp4">MP4</option>
            </select>
          </label>
          <label>
            Qualité
            <select id="quality"></select>
          </label>
        </div>

        <button id="download" type="button">Télécharger avec TubeDL</button>
        <p class="message" id="message"></p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
